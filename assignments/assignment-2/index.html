<!DOCTYPE html>
<html>
    <head>
        <title>Pizza Order Form</title>
        <link rel="stylesheet" href="css/styles.css">
        <script src="js/main.js" defer></script>
    </head>
    <body>
        <h1>Pizza Order Form</h1>
        <p id="studentInfo"></p>
        <form id="pizzaOrderForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>

            <label for="size">Size:</label>
            <select id="size" name="size" required>
                <option value="">Select size</option>
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
            </select>
            <br><br>

            <label for="crust">Crust:</label>
            <select id="crust" name="crust" required>
                <option value="">Select crust</option>
                <option value="thin">Thin</option>
                <option value="thick">Thick</option>
                <option value="stuffed">Stuffed</option>
            </select>
            <br><br>

            <label for="toppings">Toppings:</label><br>
            <input type="checkbox" name="toppings" value="pepperoni"> Pepperoni<br>
            <input type="checkbox" name="toppings" value="mushrooms"> Mushrooms<br>
            <input type="checkbox" name="toppings" value="onions"> Onions<br>
            <input type="checkbox" name="toppings" value="sausage"> Sausage<br>
            <input type="checkbox" name="toppings" value="bacon"> Bacon<br><br>

            <button type="submit">Order Pizza</button>
        </form>

        <div id="orderDescription"></div>
</html>
